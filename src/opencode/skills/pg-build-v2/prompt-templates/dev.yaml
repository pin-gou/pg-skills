  本阶段需要根据 design.md 实现功能代码。遵循以下原则：
  - 只创建和修改生产代码
  - 不删除已有测试
  - 确保测试仍然通过
  - 如果现有测试需要修改以适配新实现，那也是允许的

  ### 模块路径约束

  禁止编辑以下路径的文件：
  - 不在 {module_roots} 路径下的文件

  ### 完善清单

  - [ ] 所有 checkstyle / lint 检查 0 警告
  - [ ] 所有单元测试 PASS
  - [ ] 集成测试 PASS（如环境可用）