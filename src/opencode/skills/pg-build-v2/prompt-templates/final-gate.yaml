# final-gate.yaml — final-gate 完整提示词
# v2.1: 与 gate 一样加权评分 + 强制读取 evidence

prompt: |
  ## 任务：Final Gate — 跨 track 依赖审查（v2.1 加权评分）

  ### 变更名称
  {_change}

  ### Track 配置
  - track.id: final（特殊标记）
  - track.review_level: standard

  ### 产物路径
  - proposal: {proposal_path}
  - tasks: {tasks_path}
  - design_doc_paths: {design_doc_paths}
  - report_paths: {report_paths}

  ### 必读上下文清单（强制）

  final-gate agent **必须读取并校验存在**以下文件：

  1. **所有 design.md**（{design_doc_paths}）— 找 🆕 标记的跨 track 验证项
  2. **所有 track 的 gate assessment 报告**（{report_paths}）
     - **每个 gate assessment 必须存在**且包含 `gate-score` 字段（v2.1 强制）
  3. **pipeline.events**（`{events_path}`）— 了解 sub-agent 执行历史与已知问题；
     可通过 `python3 .opencode/skills/pg-build-v2/scripts/pg-pipeline-runner.py progress {_change}` 查看
  4. **known-issues.md**（如存在）— 累积的 gate-fix 兜底问题

  ### 加权评分维度

  | 维度 | 权重 | P0 失败条件 |
  |------|------|-----------|
  | 所有 track gate-score ≥ 80 | 50% | 任一 track gate-score < 80 |
  | 跨 track 依赖满足 | 20% | 🆕 项无对应实现证据 |
  | evidence 充分性 | 15% | 任一 track evidence_paths 为空 |
  | pipeline.events 无未解决 error | 10% | 存在未解决 error |
  | known-issues 已记录豁免 | 5% | 未豁免的已知问题 |

  ### gate-score 计算

  ```
  final_score = Σ(维度分 × 权重)
  PASS 判定: final_score ≥ 80 AND 所有 track gate-score ≥ 80
  FAIL 判定: final_score < 80 或 任一 track gate-score < 80
  ```

  ### 审计步骤

  1. **遍历所有 design.md，提取所有 🆕 标记的跨 track 验证项**
  2. **对每条 🆕 项，确认目标 track 的 gate-assessment.md 里有对应实现证据**
  3. **校验每个 gate-assessment.md 含 `gate-score` 字段且 ≥ 80**
  4. 检查 pipeline.events 没有未解决的 error（grep `type=workflow_failed` 与 `fix_cycle_started cycle=exhausted`）
  5. 列出跨 track 不一致/缺失项（如有）

  ### 判定

  - **PASS**：final_score ≥ 80 且所有 track gate-score ≥ 80，返回 `pass`
  - **FAIL**：final_score < 80 或任一 track gate-score < 80，返回 `fail`

  ### 返回契约

  除 Sub-agent 返回契约的 6 字段外，还必须包含：
  - 在 summary 中附加: `"final_score: <0-100>, min_track_score: <min>, p0_failures: [G-N, ...]"`
  - evidence_paths 必须包含所有 gate-assessment.md 路径

  ### 写盘要求

  完成审计后，自行用 cat > 写盘到 2-build/final-gate-assessment.md。
  不要将 markdown 全文塞进返回里。