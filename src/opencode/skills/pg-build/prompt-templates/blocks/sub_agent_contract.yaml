# sub_agent_contract.yaml — sub-agent 返回契约块（v2.6 精简）
# 此块被 renderer.py 通过 {sub_agent_contract_block} 占位符引用，
# 注入到所有 dispatch prompt 的尾部。
#
# v2.6 重写要点：
#   - 按 phase 裁剪必填字段表与 status 矩阵（renderer.py 注入策略占位符）
#   - result.json 路径只在命令模板里出现一次（{result_json_path}），不再展开绝对路径
#   - 删除"为什么用脚本"、"失败示例"等与完成任务无关的说明
#   - 保留全部硬约束：强制落盘、重试+fatal、status 矩阵、tasks_updated 必填、gate gate_score

block: |
  ## Sub-agent 返回契约

  **完成后调用 `pg-build-result` 生成返回值并落盘，不要手写 JSON。**

  ### 必填字段（本阶段：{phase}）

  | 字段 | 本阶段要求 |
  |------|-----------|
  | `--status` | 必填（见下方 status 矩阵） |
  | `--summary` | 必填，<= 200 字 |
  | `--track` | 必填（如 `dev.backend`） |
  | `--phase` | 必填（当前阶段） |
  | `--report` | {report_policy} |
  | `--evidence` | {evidence_policy} |
  | `--tasks-updated` | {tasks_updated_policy} |
  | `--outputs` / `--issues` | 选填 |

  ### status 矩阵（本阶段允许）

  {status_matrix_for_phase}

  ### 调用命令

  ```bash
  python3 .opencode/skills/pg-build/scripts/pg-build-result \
      --mode agent \
      --status <status> \
      --summary "<=200 字>" \
      --track <dev.xxx> \
      --phase {phase} \
      --output-path {result_json_path} \
      --require-output \
      [--report <绝对路径>] \
      [--evidence <绝对路径>]... \
      [--outputs <p1>,<p2>,...] \
      [--issues "<issue1>,<issue2>,"] \
      [--tasks-updated <id>]...
  ```

  - `{result_json_path}` 来自本 dispatch 上下文注入，**直接照抄**
  - **不调用 `--output-path` 或脚本 exit 2** → 编排器先重试一次，仍缺失则 fatal
  - 脚本 exit 1 → 字段校验失败，stderr 输出错误信息，照提示修复后重跑
  - **gate / final-gate**：summary 末尾追加 `"gate_score: <0-100>, p0_failures: [...]"`，否则 schema_violation