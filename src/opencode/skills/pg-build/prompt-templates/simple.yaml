# simple.yaml — sub=simple 完整提示词

prompt: |
  ### Simple Track 执行

  本 track 为 type=simple，执行预定 commands 即可。

  - track.timeout: {track_timeout}

  ### 命令清单

  {commands_normalized}

  ### 执行规则

  - 按顺序执行每条命令
  - 任何命令执行失败即停止并返回 FAILED

  ### 写盘要求

  完成执行后，自行用 cat > 写盘到 2-build/{report_filename}。
  内容：每条 command 的 cmd / 退出码 / stdout 末尾 ~50 行 / stderr 末尾 ~50 行 / 耗时 / 最终判定。